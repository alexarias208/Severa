<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Severa – Modo Trabajo</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-severa.svg">

    <!-- Mismas fuentes y CSS que Modo Persona (proporciones y barra superior unificadas) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/personal/css/variables.css">
    <link rel="stylesheet" href="/personal/css/base.css">
    <link rel="stylesheet" href="/personal/css/layout.css">
    <link rel="stylesheet" href="/personal/css/components.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <!-- App Shell: misma estructura que Modo Persona (sidebar + header + main) -->
    <div id="app-shell">
        <aside id="trabajo-sidebar" class="app-sidebar" aria-label="Navegación por perfil" style="display:none;">
            <nav id="sidebar-nav" class="sidebar-menu"></nav>
            <div class="sidebar-footer" aria-hidden="true"></div>
            <button type="button" id="btn-sidebar-collapse" class="sidebar-collapse-btn" title="Colapsar barra lateral" aria-label="Colapsar barra lateral" style="display:none;">
                <span aria-hidden="true">◀</span>
            </button>
        </aside>

        <header id="app-header" class="app-header">
            <div class="header-left">
                <button type="button" id="btn-sidebar-expand" class="header-sidebar-expand hidden" title="Mostrar barra lateral" aria-label="Mostrar barra lateral">
                    <span aria-hidden="true">▶</span>
                </button>
                <a href="#area" class="header-brand-link" title="Volver al inicio" aria-label="Volver al inicio">
                    <img src="assets/logo-severa.svg" alt="" class="header-logo-img" width="24" height="24"/>
                    <span class="header-brand-text">SEVERA</span>
                    <span class="header-mode-label text-secondary" style="font-weight:500;margin-left:6px;">Modo Trabajo</span>
                </a>
            </div>
            <div class="header-center" id="header-actions">
                <span id="header-datetime" class="header-datetime text-secondary" aria-live="polite" title="Fecha y hora actual"></span>
            </div>
            <div class="header-right">
                <button type="button" id="btn-theme-toggle" class="btn-icon theme-toggle" title="Cambiar tema (dark, light, pink, blue)" aria-label="Cambiar tema">
                    <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                    </svg>
                </button>
                <a href="/personal/index.html?modo=persona" class="btn btn-ghost btn-sm header-mode-work" title="Ir a Modo Persona">
                    <span aria-hidden="true">👤</span>
                    <span class="header-mode-work-label">Modo Persona</span>
                </a>
                <a href="#perfil" class="btn btn-ghost btn-sm" title="Elegir perfil o gestionar profesiones">Perfiles</a>
            </div>
        </header>

        <main id="trabajo-main" class="main-content">
            <div class="page-container"></div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="/personal/js/data/data-contract.js"></script>
    <script src="/personal/js/data/validate.js"></script>
    <script src="js/data/data-service.js"></script>
    <script src="/personal/js/utils/logger.js"></script>
    <script src="/personal/js/utils/flags.js"></script>
    <script src="/personal/js/utils/feriados.js"></script>
    <script src="js/mm-finance.js"></script>
    <script src="js/mm-minimarket.js"></script>
    <script src="js/educacion.js"></script>
    <script src="js/prevencion.js"></script>
    <script src="js/pasteleria.js"></script>
    <script src="js/perfiles.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 4 temas (igual que Modo Persona): dark, light, pink, blue
        (function initTrabajoTheme() {
            var THEMES = ['dark', 'light', 'pink', 'blue'];
            var saved = localStorage.getItem('plataforma_theme') || 'dark';
            var theme = THEMES.indexOf(saved) >= 0 ? saved : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('plataforma_theme', theme);

            function updateIcons() {
                var t = document.documentElement.getAttribute('data-theme') || 'dark';
                var sun = document.getElementById('theme-icon-sun');
                var moon = document.getElementById('theme-icon-moon');
                if (sun && moon) {
                    sun.classList.toggle('hidden', t === 'dark' || t === 'blue');
                    moon.classList.toggle('hidden', t === 'light' || t === 'pink');
                }
            }
            updateIcons();

            document.getElementById('btn-theme-toggle') && document.getElementById('btn-theme-toggle').addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme') || 'dark';
                var i = (THEMES.indexOf(current) + 1) % THEMES.length;
                var next = THEMES[i];
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('plataforma_theme', next);
                updateIcons();
            });
        })();

        // Fecha/hora en header (como Modo Persona)
        (function updateHeaderDatetime() {
            var el = document.getElementById('header-datetime');
            if (!el) return;
            var now = new Date();
            var opts = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            el.textContent = now.toLocaleDateString('es-ES', opts);
            setTimeout(updateHeaderDatetime, 60000);
        })();
    </script>
</body>
</html>
