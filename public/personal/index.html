<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Severa – Mi Plataforma Personal</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-severa.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/theme-persona.css">

    <!-- CDN Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content">
            <button id="modal-close-btn" class="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="hidden">
        <!-- Sidebar (visible solo en escritorio; sin logo/SEVERA, van en el header) -->
        <aside id="app-sidebar" class="app-sidebar" aria-label="Navegación principal">
            <nav id="sidebar-nav" class="sidebar-menu"></nav>
            <div id="sidebar-footer" class="sidebar-footer" aria-label="Cambiar a modo trabajo"></div>
            <button type="button" id="btn-sidebar-collapse" class="sidebar-collapse-btn" title="Colapsar barra lateral" aria-label="Colapsar barra lateral">
                <span aria-hidden="true">◀</span>
            </button>
        </aside>
        <!-- Header: logo + SEVERA a la izquierda; acciones y usuario a la derecha -->
        <header id="app-header" class="app-header">
            <div class="header-left">
                <button type="button" id="btn-sidebar-expand" class="header-sidebar-expand hidden" title="Mostrar barra lateral" aria-label="Mostrar barra lateral">
                    <span aria-hidden="true">▶</span>
                </button>
                <a href="#dashboard" class="header-brand-link" title="Volver al inicio" aria-label="Volver al inicio">
                    <img src="assets/logo-severa.svg" alt="" class="header-logo-img" width="24" height="24"/>
                    <span class="header-brand-text">SEVERA</span>
                    <span class="header-mode-label text-secondary" style="font-weight:500;margin-left:6px;">Modo Persona</span>
                </a>
            </div>
            <div class="header-center" id="header-actions">
                <span id="header-datetime" class="header-datetime text-secondary" aria-live="polite" title="Fecha y hora actual"></span>
                <button id="btn-quick-expense" class="btn btn-sm" style="background:var(--glass-bg);color:var(--text-secondary);border:var(--glass-border);" title="Gasto rápido">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Gasto
                </button>
                <button id="btn-quick-event" class="btn btn-sm" style="background:var(--glass-bg);color:var(--text-secondary);border:var(--glass-border);" title="Evento rápido">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Evento
                </button>
                <button id="btn-export" class="btn-icon btn-sm" style="color:var(--text-secondary);" title="Exportar Excel">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>
            <div class="header-right">
                <a href="/trabajo/index.html" class="btn btn-ghost btn-sm header-mode-work" title="Ir a Modo Trabajo (misma pestaña)"><span aria-hidden="true">💼</span><span class="header-mode-work-label">Modo trabajo</span></a>
                <button id="btn-theme-toggle" class="btn-icon theme-toggle" title="Cambiar tema">
                    <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                    </svg>
                </button>
                <div class="header-avatar-wrap" id="header-avatar-wrap">
                    <span id="header-profile-notif" class="header-notif-badge hidden" title="Completa tu perfil: tipo de cuerpo y datos para recomendaciones">!</span>
                    <button id="btn-user-avatar" class="user-avatar" title="Perfil">
                        <span id="user-initial">U</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content (no sidebar) -->
        <main id="main-content" class="main-content">
            <div id="page-container" class="page-container fade-in"></div>
        </main>

        <!-- Bottom navigation: move between activities without going to menu -->
        <nav id="bottom-nav" class="bottom-nav" aria-label="Navegación entre actividades"></nav>
    </div>

    <!-- Login/Register Screen (contenido por defecto para evitar pantalla en blanco hasta que cargue el JS) -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card" style="padding: 2rem; text-align: center;">
            <p style="color: #e2e8f0; margin: 0;">Cargando Severa…</p>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/utils/date.js"></script>
    <script src="js/utils/feriados.js"></script>
    <script src="js/utils/charts.js"></script>
    <script src="js/utils/export.js"></script>
    <script src="js/tauri-storage.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils/script-loader.js"></script>
    <script src="js/data/data-contract.js"></script>
    <script src="js/data/validate.js"></script>
    <script src="js/data/data-service.js"></script>
    <script src="js/utils/priorities-sync.js"></script>
    <script src="js/utils/logger.js"></script>
    <script src="js/utils/flags.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/help.js"></script>
    <script src="js/tutorial.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/onboarding.js"></script>
    <script src="js/manager.js"></script>
    <script src="js/router.js"></script>

    <!-- Page Scripts -->
    <script src="js/utils/modo-trabajo-url.js"></script>
    <script src="js/utils/trabajo-calendar-bridge.js"></script>
    <script src="js/pages/landing.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/selectProfile.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/calendar.js"></script>
    <script src="js/pages/finance.js"></script>
    <script src="js/pages/sharedExpenses.js"></script>
    <script src="js/pages/summary.js"></script>
    <script src="js/pages/studies.js"></script>
    <!-- PR-05: lazy-load Biblia (muy pesado) al entrar a #religion -->
    <script src="js/pages/cycle.js"></script>
    <script src="js/pages/habits.js"></script>
    <script src="js/pages/exercises.js"></script>
    <script src="js/pages/games.js"></script>
    <script src="js/pages/documents.js"></script>
    <script src="js/pages/diary.js"></script>
    <script src="js/pages/foda.js"></script>
    <script src="js/pages/intimate.js"></script>
    <script src="js/pages/gratitud.js"></script>
    <script src="js/pages/salud.js"></script>
    <script src="js/pages/biografia.js"></script>
    <script src="js/pages/viajes.js"></script>
    <script src="js/pages/settings.js"></script>

    <!-- App Init -->
    <script src="js/app.js"></script>
</body>
</html>
